naftiko: 1.0.0-alpha2
info:
  label: Pocket Network CometBFT — Status
  description: 'Query CometBFT node status, network info, latest block, and transaction lookup on
    Shannon. Lead operation: getCometbftStatus. Self-contained Naftiko capability for the CometBFT
    RPC surface.'
  tags:
  - Pocket Network
  - Shannon
  - CometBFT
  - RPC
  created: '2026-05-25'
  modified: '2026-05-25'
binds: []
capability:
  consumes:
  - type: http
    namespace: cometbft-status
    baseUri: https://shannon-grove-rpc.mainnet.poktroll.com
    description: CometBFT RPC status capability.
    resources:
    - name: status
      path: /status
      operations:
      - name: getcometbftstatus
        method: GET
        description: Get Cometbft Node Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: net-info
      path: /net_info
      operations:
      - name: getcometbftnetinfo
        method: GET
        description: Get Cometbft Network Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: block
      path: /block
      operations:
      - name: getcometbftblock
        method: GET
        description: Get Cometbft Block
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: height
          in: query
          type: integer
          required: false
    - name: tx
      path: /tx
      operations:
      - name: getcometbfttransaction
        method: GET
        description: Get Cometbft Transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: hash
          in: query
          type: string
          required: true
    authentication:
      type: none
  exposes:
  - type: rest
    namespace: cometbft-status-rest
    port: 8080
    resources:
    - path: /v1/cometbft/status
      name: status
      operations:
      - method: GET
        name: getcometbftstatus
        description: Get Cometbft Node Status
        call: cometbft-status.getcometbftstatus
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cometbft/net-info
      name: net-info
      operations:
      - method: GET
        name: getcometbftnetinfo
        description: Get Cometbft Network Info
        call: cometbft-status.getcometbftnetinfo
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cometbft/block
      name: block
      operations:
      - method: GET
        name: getcometbftblock
        description: Get Cometbft Block
        call: cometbft-status.getcometbftblock
        with:
          height: rest.query.height
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cometbft/tx
      name: tx
      operations:
      - method: GET
        name: getcometbfttransaction
        description: Get Cometbft Transaction
        call: cometbft-status.getcometbfttransaction
        with:
          hash: rest.query.hash
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cometbft-status-mcp
    port: 9090
    transport: http
    tools:
    - name: pocket-network-get-cometbft-status
      description: Get Cometbft Node Status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cometbft-status.getcometbftstatus
      outputParameters:
      - type: object
        mapping: $.
    - name: pocket-network-get-cometbft-tx
      description: Get Cometbft Transaction
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cometbft-status.getcometbfttransaction
      with:
        hash: tools.hash
      outputParameters:
      - type: object
        mapping: $.
